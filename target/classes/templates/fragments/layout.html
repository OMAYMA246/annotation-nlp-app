<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title} + ' — AnnotPlatform'">AnnotPlatform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>

<nav th:fragment="navbar" class="navbar navbar-expand-lg">
    <div class="container-fluid px-4">
        <a class="navbar-brand text-white fw-semibold" href="/dashboard">
            <i class="bi bi-tags-fill me-2" style="color:#60a5fa"></i>AnnotPlatform
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMain">
            <ul class="navbar-nav me-auto gap-1 ps-3">
                <li class="nav-item" sec:authorize="hasRole('ADMIN_ROLE')">
                    <a class="nav-link px-3 py-2" th:href="@{/admin/datasets}">
                        <i class="bi bi-database me-1"></i>Datasets
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN_ROLE')">
                    <a class="nav-link px-3 py-2" th:href="@{/admin/annotateurs}">
                        <i class="bi bi-people me-1"></i>Annotateurs
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ANNOTATOR_ROLE')">
                    <a class="nav-link px-3 py-2" th:href="@{/annotateur/taches}">
                        <i class="bi bi-list-task me-1"></i>Mes Tâches
                    </a>
                </li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle px-3" href="#" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle me-1"></i>
                        <span sec:authentication="name">Utilisateur</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button class="dropdown-item text-danger" type="submit">
                                    <i class="bi bi-box-arrow-right me-2"></i>Déconnexion
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div th:fragment="alerts" class="px-4 pt-3">
    <div th:if="${success}" class="ap-alert ap-alert-success mb-0">
        <i class="bi bi-check-circle-fill"></i>
        <span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="ap-alert ap-alert-danger mb-0">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span th:text="${error}"></span>
    </div>
</div>

<footer th:fragment="scripts">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</footer>
</html>
