<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('ML - Entrainement')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>
<div class="container-fluid mt-4">
  <div class="d-flex align-items-center mb-4">
    <a th:href="@{/admin/datasets/{id}(id=${dataset.id})}" class="btn btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i></a>
    <div>
      <h2 class="fw-bold mb-0"><i class="bi bi-cpu me-2 text-primary"></i>Machine Learning</h2>
      <small class="text-muted" th:text="${dataset.nomDataset}"></small>
    </div>
  </div>
  <div class="row g-4">
    <div class="col-lg-4">
      <div class="card border-0 shadow-sm mb-4">
        <div class="card-header bg-primary text-white fw-semibold"><i class="bi bi-play-circle me-2"></i>Entrainer le modele</div>
        <div class="card-body">
          <p class="text-muted small">Lance un entrainement sur toutes les annotations. Modele : <strong>Regression Logistique TF-IDF</strong>.</p>
          <form th:action="@{/admin/datasets/{id}/ml/entrainer(id=${dataset.id})}" method="post" onsubmit="return confirm('Lancer l entrainement ?')">
            <button type="submit" class="btn btn-primary w-100"><i class="bi bi-play-fill me-2"></i>Lancer l entrainement</button>
          </form>
        </div>
      </div>
      <div class="card border-0 shadow-sm">
        <div class="card-header bg-success text-white fw-semibold"><i class="bi bi-lightning me-2"></i>Tester une prediction</div>
        <div class="card-body">
          <form th:action="@{/admin/datasets/{id}/ml/predire(id=${dataset.id})}" method="post">
            <div class="mb-3">
              <label class="form-label fw-semibold">Texte a classifier</label>
              <textarea name="texte" class="form-control" rows="3" placeholder="Entrez un texte..." required th:text="${textePredit}"></textarea>
            </div>
            <button type="submit" class="btn btn-success w-100"><i class="bi bi-search me-2"></i>Predire</button>
          </form>
          <div th:if="${predictionResult}" class="mt-3">
            <div class="alert alert-info">
              <div class="fw-bold fs-5 mb-2"><i class="bi bi-tag-fill me-2"></i>Resultat : <span id="predLabel" class="badge bg-primary fs-6"></span></div>
              <div id="probBars"></div>
            </div>
            <script th:inline="javascript">
              /*<![CDATA[*/
              try {
                const data = JSON.parse(/*[[${predictionResult}]]*/ '{}');
                if (data.prediction) document.getElementById('predLabel').textContent = data.prediction;
                if (data.probabilities) {
                  const c = document.getElementById('probBars');
                  Object.entries(data.probabilities).sort((a,b)=>b[1]-a[1]).forEach(([cls,prob])=>{
                    const pct = Math.round(prob*100);
                    c.innerHTML += `<div class="mb-1"><div class="d-flex justify-content-between small"><span>${cls}</span><span>${pct}%</span></div><div class="progress" style="height:8px"><div class="progress-bar" style="width:${pct}%"></div></div></div>`;
                  });
                }
              } catch(e){}
              /*]]>*/
            </script>
          </div>
        </div>
      </div>
    </div>
    <div class="col-lg-8">
      <div class="card border-0 shadow-sm">
        <div class="card-header fw-semibold"><i class="bi bi-clock-history me-2"></i>Historique des entrainements</div>
        <div class="card-body p-0">
          <div th:if="${historique.empty}" class="text-center py-5 text-muted">
            <i class="bi bi-cpu" style="font-size:3rem"></i>
            <p class="mt-3">Aucun entrainement lance.</p>
          </div>
          <div th:each="m : ${historique}" class="border-bottom p-4">
            <div class="d-flex justify-content-between align-items-start mb-3">
              <div>
                <span class="badge fs-6 me-2"
                      th:classappend="${m.statut == 'SUCCES'} ? 'bg-success' : (${m.statut == 'EN_COURS'} ? 'bg-warning text-dark' : 'bg-danger')"
                      th:text="${m.statut}"></span>
                <small class="text-muted" th:text="${#temporals.format(m.dateEntrainement, 'dd/MM/yyyy HH:mm:ss')}"></small>
              </div>
              <small class="text-muted">ID #<span th:text="${m.id}"></span></small>
            </div>
            <div th:if="${m.statut == 'SUCCES'}" class="row g-3 mb-3">
              <div class="col-sm-3">
                <div class="bg-light rounded p-3 text-center">
                  <div class="fs-4 fw-bold text-success" th:text="${#numbers.formatDecimal(m.accuracy * 100, 1, 1)} + '%'"></div>
                  <small class="text-muted">Accuracy</small>
                </div>
              </div>
              <div class="col-sm-3">
                <div class="bg-light rounded p-3 text-center">
                  <div class="fs-4 fw-bold text-primary" th:text="${#numbers.formatDecimal(m.f1Score * 100, 1, 1)} + '%'"></div>
                  <small class="text-muted">F1-Score</small>
                </div>
              </div>
              <div class="col-sm-3">
                <div class="bg-light rounded p-3 text-center">
                  <div class="fs-4 fw-bold" th:text="${m.trainSize}"></div>
                  <small class="text-muted">Train</small>
                </div>
              </div>
              <div class="col-sm-3">
                <div class="bg-light rounded p-3 text-center">
                  <div class="fs-4 fw-bold" th:text="${m.testSize}"></div>
                  <small class="text-muted">Test</small>
                </div>
              </div>
            </div>
            <div th:if="${m.statut == 'SUCCES' and m.confusionMatrixJson != null}">
              <button class="btn btn-sm btn-outline-secondary mb-2" type="button"
                      th:data-bs-target="'#cm_' + ${m.id}" data-bs-toggle="collapse">
                <i class="bi bi-grid-3x3 me-1"></i>Matrice de confusion
              </button>
              <div th:id="'cm_' + ${m.id}" class="collapse">
                <pre class="bg-light rounded p-3 small" th:text="${m.confusionMatrixJson}"></pre>
              </div>
            </div>
            <div th:if="${m.statut == 'ERREUR'}" class="alert alert-danger py-2 mb-2">
              <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${m.messageErreur}"></span>
            </div>
            <div th:if="${m.logsEntrainement != null}" class="mt-2">
              <button class="btn btn-sm btn-outline-secondary" type="button"
                      th:data-bs-target="'#logs_' + ${m.id}" data-bs-toggle="collapse">
                <i class="bi bi-terminal me-1"></i>Voir les logs
              </button>
              <div th:id="'logs_' + ${m.id}" class="collapse mt-2">
                <pre class="bg-dark text-light rounded p-3 small" style="max-height:200px;overflow-y:auto;" th:text="${m.logsEntrainement}"></pre>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<footer th:replace="~{fragments/layout :: scripts}"></footer>
<script th:inline="javascript">
/*<![CDATA[*/
const enCours = /*[[${#lists.size(historique) > 0 and historique[0].statut == 'EN_COURS'}]]*/ false;
if (enCours) { setTimeout(()=>location.reload(), 5000); }
/*]]>*/
</script>
</body>
</html>
