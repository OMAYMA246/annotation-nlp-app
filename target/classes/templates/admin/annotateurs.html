<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Annotateurs')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>

<div class="page-wrapper">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-0" style="font-size:1.4rem">
                <i class="bi bi-people me-2" style="color:#3b82f6"></i>Annotateurs
            </h2>
            <p class="text-muted mb-0" style="font-size:.85rem">
                <span th:text="${annotateurs.size()}"></span> annotateur(s) enregistré(s)
            </p>
        </div>
        <a th:href="@{/admin/annotateurs/nouveau}" class="ap-btn ap-btn-primary">
            <i class="bi bi-person-plus"></i>Ajouter
        </a>
    </div>

    <!-- Vide -->
    <div th:if="${annotateurs.empty}" class="ap-card text-center py-5">
        <i class="bi bi-people" style="font-size:3rem;color:#cbd5e1"></i>
        <p class="fw-semibold mt-3 mb-1">Aucun annotateur</p>
        <a th:href="@{/admin/annotateurs/nouveau}" class="ap-btn ap-btn-primary mt-2">
            <i class="bi bi-person-plus"></i>Ajouter le premier
        </a>
    </div>

    <!-- Table -->
    <div class="ap-card" th:if="${!annotateurs.empty}">
        <div class="ap-card-header">
            <span><i class="bi bi-list-ul me-2" style="color:#3b82f6"></i>Liste des annotateurs</span>
            <span class="ap-badge ap-badge-blue" th:text="${annotateurs.size()}"></span>
        </div>
        <div class="table-responsive">
            <table class="ap-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Nom complet</th>
                        <th>Login</th>
                        <th>Statut</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="annot, iter : ${annotateurs}">
                        <td class="text-muted" th:text="${iter.index + 1}"></td>
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <div style="width:32px;height:32px;border-radius:50%;background:#eff6ff;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:600;color:#1d4ed8;flex-shrink:0"
                                     th:text="${#strings.substring(annot.prenom,0,1) + #strings.substring(annot.nom,0,1)}"></div>
                                <div>
                                    <div class="fw-semibold" style="font-size:.875rem"
                                         th:text="${annot.prenom + ' ' + annot.nom}"></div>
                                </div>
                            </div>
                        </td>
                        <td>
                            <code style="font-size:.8rem;background:#f8fafc;padding:2px 8px;border-radius:5px;border:1px solid #e2e8f0"
                                  th:text="${annot.login}"></code>
                        </td>
                        <td>
                            <form th:action="@{/admin/annotateurs/{id}/toggle(id=${annot.id})}"
                                  method="post" class="mb-0 d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="ap-badge border-0"
                                        th:classappend="${annot.active} ? 'ap-badge-green' : 'ap-badge-gray'"
                                        style="cursor:pointer;font-size:.78rem;padding:5px 12px"
                                        th:text="${annot.active} ? 'Actif' : 'Inactif'">
                                </button>
                            </form>
                        </td>
                        <td>
                            <div class="d-flex gap-2">
                                <a th:href="@{/admin/annotateurs/{id}/modifier(id=${annot.id})}"
                                   class="ap-btn ap-btn-outline ap-btn-sm">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/admin/annotateurs/{id}/stats(id=${annot.id})}"
                                   class="ap-btn ap-btn-outline ap-btn-sm">
                                    <i class="bi bi-bar-chart"></i>
                                </a>
                                <form th:action="@{/admin/annotateurs/{id}/supprimer(id=${annot.id})}"
                                      method="post" class="mb-0"
                                      onsubmit="return confirm('Supprimer cet annotateur ?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button class="ap-btn ap-btn-danger ap-btn-sm">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div style="padding:10px 16px;border-top:1px solid #f1f5f9">
            <small class="text-muted">
                <i class="bi bi-info-circle me-1"></i>
                La suppression désactive le compte sans effacer les annotations existantes.
            </small>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: scripts}"></footer>
</body>
</html>
