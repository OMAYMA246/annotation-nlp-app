<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Annoter')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>

<div class="page-wrapper" style="max-width:760px">
    <!-- Header -->
    <div class="d-flex justify-content-between align-items-start mb-3">
        <div>
            <h2 class="fw-bold mb-1" style="font-size:1.2rem">
                <i class="bi bi-pencil-square me-2" style="color:#3b82f6"></i>Annotation
            </h2>
            <div class="d-flex align-items-center gap-2">
                <span class="ap-badge ap-badge-blue" th:text="${dataset.nomDataset}"></span>
                <span class="text-muted" style="font-size:.82rem">
                    Exemple #<span th:text="${exemple.id}"></span>
                </span>
            </div>
        </div>
        <button th:if="${dataset.description != null}"
                class="ap-btn ap-btn-outline ap-btn-sm"
                data-bs-toggle="collapse" data-bs-target="#descPanel">
            <i class="bi bi-info-circle"></i>Info
        </button>
    </div>

    <div class="collapse mb-3" id="descPanel" th:if="${dataset.description != null}">
        <div class="ap-alert ap-alert-info" th:text="${dataset.description}"></div>
    </div>

    <!-- Progress -->
    <div class="ap-card mb-3 p-3">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <span style="font-size:.82rem;color:#64748b">Progression</span>
            <span style="font-size:.82rem;font-weight:600;color:#64748b">
                <span th:text="${positionActuelle}"></span> / <span th:text="${totalTaches}"></span>
            </span>
        </div>
        <div class="ap-progress" th:if="${totalTaches > 0}">
            <div class="ap-progress-bar" style="background:#3b82f6"
                 th:style="'width:' + ${#numbers.formatDecimal(positionActuelle * 100.0 / totalTaches, 0, 0)} + '%;background:#3b82f6'"></div>
        </div>
    </div>

    <!-- Card annotation -->
    <div class="ap-card">
        <div class="p-4">
            <form th:action="@{/annotateur/annoter/{id}(id=${exemple.id})}" method="post">

                <!-- Texte 1 -->
                <div class="mb-4">
                    <label class="ap-form-label" style="color:#3b82f6">
                        <i class="bi bi-card-text me-1"></i>
                        <span th:if="${dataset.nombreTextesParExemple == 1}">Texte</span>
                        <span th:if="${dataset.nombreTextesParExemple >= 2}">Texte 1</span>
                    </label>
                    <div class="text-display" th:text="${exemple.textes[0]}"></div>
                </div>

                <!-- Texte 2 -->
                <div class="mb-4" th:if="${dataset.nombreTextesParExemple >= 2 and exemple.textes.size() > 1}">
                    <label class="ap-form-label" style="color:#16a34a">
                        <i class="bi bi-card-text me-1"></i>Texte 2
                    </label>
                    <div class="text-display" th:text="${exemple.textes[1]}"></div>
                </div>

                <!-- Classes -->
                <div class="mb-4">
                    <label class="ap-form-label">Choisir la classe</label>
                    <div class="d-flex flex-wrap gap-2" id="classButtons">
                        <label th:each="classe : ${classesPossibles}"
                               class="class-btn"
                               th:classappend="${annotationExistante != null and annotationExistante.classeChoisie == classe.libelleClasse} ? ' selected' : ''">
                            <input type="radio" name="classeChoisie"
                                   th:value="${classe.libelleClasse}"
                                   th:checked="${annotationExistante != null and annotationExistante.classeChoisie == classe.libelleClasse}"
                                   required style="display:none"/>
                            <span th:text="${classe.libelleClasse}"></span>
                        </label>
                    </div>
                    <div th:if="${annotationExistante != null}" class="mt-2">
                        <span class="ap-badge ap-badge-green">
                            <i class="bi bi-check-circle me-1"></i>
                            Déjà annoté : <strong th:text="${annotationExistante.classeChoisie}"></strong>
                        </span>
                    </div>
                </div>

                <!-- Navigation -->
                <div class="d-flex justify-content-between align-items-center pt-3"
                     style="border-top:1px solid #f1f5f9">
                    <a th:if="${precedentId != null}"
                       th:href="@{/annotateur/annoter/{id}(id=${precedentId})}"
                       class="ap-btn ap-btn-outline">
                        <i class="bi bi-chevron-left"></i>Précédent
                    </a>
                    <span th:if="${precedentId == null}" class="text-muted" style="font-size:.8rem">— Début —</span>

                    <button type="submit" name="suivant" value="false" class="ap-btn ap-btn-primary px-4">
                        <i class="bi bi-check-lg"></i>Valider
                    </button>

                    <div>
                        <button th:if="${suivantId != null}"
                                type="submit" name="suivant" value="true"
                                class="ap-btn ap-btn-outline">
                            Suivant<i class="bi bi-chevron-right"></i>
                        </button>
                        <span th:if="${suivantId == null}" class="text-muted" style="font-size:.8rem">— Fin —</span>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="text-center mt-3">
        <a th:href="@{/annotateur/taches}" class="text-muted text-decoration-none" style="font-size:.85rem">
            <i class="bi bi-arrow-left me-1"></i>Retour à mes tâches
        </a>
    </div>
</div>

<footer th:replace="~{fragments/layout :: scripts}"></footer>
<script>
document.querySelectorAll('.class-btn').forEach(label => {
    label.addEventListener('click', () => {
        document.querySelectorAll('.class-btn').forEach(l => l.classList.remove('selected'));
        label.classList.add('selected');
    });
});
</script>
</body>
</html>
