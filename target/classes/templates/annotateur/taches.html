<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Mes Taches')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>

<div class="container-fluid mt-4">
    <h2 class="fw-bold mb-4">Mes Taches</h2>

    <div class="row g-3 mb-4">
        <div class="col-sm-3">
            <div class="card border-0 shadow-sm text-center p-3">
                <div class="fs-2 fw-bold text-primary" th:text="${stats.totalTaches}">0</div>
                <div class="text-muted small">Total</div>
            </div>
        </div>
        <div class="col-sm-3">
            <div class="card border-0 shadow-sm text-center p-3">
                <div class="fs-2 fw-bold text-success" th:text="${stats.tachesTerminees}">0</div>
                <div class="text-muted small">Terminees</div>
            </div>
        </div>
        <div class="col-sm-3">
            <div class="card border-0 shadow-sm text-center p-3">
                <div class="fs-2 fw-bold text-warning" th:text="${stats.tachesRestantes}">0</div>
                <div class="text-muted small">Restantes</div>
            </div>
        </div>
        <div class="col-sm-3">
            <div class="card border-0 shadow-sm p-3">
                <div class="small text-muted mb-1">Progression</div>
                <div class="progress" style="height:14px">
                    <div class="progress-bar bg-success"
                         th:style="'width:' + ${#numbers.formatDecimal(stats.progression, 0, 0)} + '%'"></div>
                </div>
                <div class="small mt-1" th:text="${#numbers.formatDecimal(stats.progression, 0, 1)} + '%'"></div>
            </div>
        </div>
    </div>

    <div th:if="${taches.empty}" class="text-center py-5 text-muted">
        <p class="mt-3 fs-5">Aucune tache assignee pour le moment.</p>
    </div>

    <div th:if="${!taches.empty}">
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-header bg-warning text-dark fw-semibold">
                A annoter
                <span class="badge bg-dark ms-2" th:text="${stats.tachesRestantes}"></span>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Dataset</th>
                            <th>Apercu</th>
                            <th>Action</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="tache : ${taches}" th:if="${!tache.terminee}">
                            <td th:text="${tache.exemple.id}"></td>
                            <td>
                                <span class="badge bg-primary" th:text="${tache.dataset.nomDataset}"></span>
                            </td>
                            <td>
                                    <span th:text="${#strings.abbreviate(tache.exemple.textes[0], 80)}"
                                          class="text-muted small"></span>
                            </td>
                            <td>
                                <a th:href="@{/annotateur/annoter/{id}(id=${tache.exemple.id})}"
                                   class="btn btn-sm btn-primary">Annoter</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm" th:if="${stats.tachesTerminees > 0}">
            <div class="card-header bg-success text-white fw-semibold">
                Terminees
                <span class="badge bg-light text-dark ms-2" th:text="${stats.tachesTerminees}"></span>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Dataset</th>
                            <th>Apercu</th>
                            <th>Action</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="tache : ${taches}" th:if="${tache.terminee}">
                            <td th:text="${tache.exemple.id}"></td>
                            <td><span class="badge bg-primary" th:text="${tache.dataset.nomDataset}"></span></td>
                            <td>
                                    <span th:text="${#strings.abbreviate(tache.exemple.textes[0], 80)}"
                                          class="text-muted small"></span>
                            </td>
                            <td>
                                <a th:href="@{/annotateur/annoter/{id}(id=${tache.exemple.id})}"
                                   class="btn btn-sm btn-outline-success">Revoir</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: scripts}"></footer>
</body>
</html>
