<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Connexion — AnnotPlatform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="login-wrapper">
<div class="login-card">
    <div class="login-logo">
        <i class="bi bi-tags-fill" style="font-size:1.6rem;color:#3b82f6"></i>
    </div>
    <h1 class="text-center fw-bold mb-1" style="font-size:1.3rem">AnnotPlatform</h1>
    <p class="text-center text-muted mb-4" style="font-size:.85rem">Plateforme d'annotation NLP</p>

    <div th:if="${param.error}" class="ap-alert ap-alert-danger mb-3">
        <i class="bi bi-exclamation-triangle-fill"></i>Login ou mot de passe incorrect.
    </div>
    <div th:if="${param.logout}" class="ap-alert ap-alert-info mb-3">
        <i class="bi bi-check-circle-fill"></i>Vous avez été déconnecté.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="ap-form-label">Login</label>
            <div class="input-group">
                <span class="input-group-text bg-white border-end-0">
                    <i class="bi bi-person text-muted"></i>
                </span>
                <input type="text" name="username" class="form-control border-start-0 ps-0"
                       placeholder="Votre login" required autofocus
                       style="border-radius:0 7px 7px 0"/>
            </div>
        </div>
        <div class="mb-4">
            <label class="ap-form-label">Mot de passe</label>
            <div class="input-group">
                <span class="input-group-text bg-white border-end-0">
                    <i class="bi bi-lock text-muted"></i>
                </span>
                <input type="password" name="password" class="form-control border-start-0 ps-0"
                       placeholder="••••••••" required
                       style="border-radius:0 7px 7px 0"/>
            </div>
        </div>
        <button type="submit" class="ap-btn ap-btn-primary w-100 justify-content-center py-2">
            <i class="bi bi-box-arrow-in-right"></i>Se connecter
        </button>
    </form>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
