# ================================
# DataSource - MySQL/MariaDB
# ================================
spring.datasource.url=jdbc:mysql://db:3306/annotation_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=annotation_user
spring.datasource.password=annotation_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================================
# JPA / Hibernate
# ================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ================================
# Thymeleaf
# ================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ================================
# File Upload
# ================================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ================================
# Server
# ================================
server.port=8080
server.servlet.context-path=/

# ================================
# Logging
# ================================
logging.level.com.annotation=DEBUG
logging.level.org.springframework.security=WARN
