<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Gestion des Annotateurs')}"></head>
<body class="bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>

<div class="container-fluid mt-4" style="max-width:900px">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0">
            <i class="bi bi-people me-2 text-primary"></i>Gestion des Annotateurs
        </h2>
        <a th:href="@{/admin/annotateurs/nouveau}" class="btn btn-primary">
            <i class="bi bi-person-plus me-2"></i>+ Ajouter
        </a>
    </div>

    <div th:if="${annotateurs.empty}" class="card border-0 shadow-sm text-center py-5 text-muted">
        <i class="bi bi-person-x" style="font-size:3rem"></i>
        <p class="mt-3 fs-5 mb-2">Aucun annotateur créé pour le moment.</p>
        <a th:href="@{/admin/annotateurs/nouveau}" class="btn btn-primary mt-2">
            <i class="bi bi-person-plus me-1"></i>Ajouter le premier annotateur
        </a>
    </div>

    <div class="card border-0 shadow-sm" th:if="${!annotateurs.empty}">
        <div class="card-header fw-semibold bg-white border-bottom">
            <i class="bi bi-list-ul me-2 text-primary"></i>Liste Annotateurs
            <span class="badge bg-primary ms-2" th:text="${annotateurs.size()}"></span>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-light">
                    <tr>
                        <th style="width:40px">#</th>
                        <th>Nom</th>
                        <th>Prénom</th>
                        <th>Login</th>
                        <th class="text-center">Statut</th>
                        <th class="text-center">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="annot, iter : ${annotateurs}"
                        th:classappend="${!annot.active} ? 'table-secondary opacity-75' : ''">
                        <td class="text-muted" th:text="${iter.index + 1}"></td>
                        <td class="fw-semibold" th:text="${annot.nom}"></td>
                        <td th:text="${annot.prenom}"></td>
                        <td><code th:text="${annot.login}"></code></td>
                        <td class="text-center">
                            <form th:action="@{/admin/annotateurs/{id}/toggle(id=${annot.id})}"
                                  method="post" class="mb-0 d-inline">
                                <button type="submit"
                                        class="badge border-0"
                                        th:classappend="${annot.active} ? 'bg-success' : 'bg-secondary'"
                                        style="cursor:pointer;font-size:0.85rem;padding:5px 10px"
                                        th:text="${annot.active} ? 'Actif' : 'Inactif'">
                                </button>
                            </form>
                        </td>
                        <td class="text-center">
                            <div class="d-flex gap-2 justify-content-center">
                                <a th:href="@{/admin/annotateurs/{id}/modifier(id=${annot.id})}"
                                   class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-pencil me-1"></i>Modifier
                                </a>
                                <a th:href="@{/admin/annotateurs/{id}/stats(id=${annot.id})}"
                                   class="btn btn-sm btn-outline-info">
                                    <i class="bi bi-bar-chart me-1"></i>Stats
                                </a>
                                <form th:action="@{/admin/annotateurs/{id}/supprimer(id=${annot.id})}"
                                      method="post" class="mb-0"
                                      onsubmit="return confirm('Supprimer cet annotateur ?')">
                                    <button class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash me-1"></i>Supprimer
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="card-footer bg-light border-top">
            <small class="text-muted">
                <i class="bi bi-exclamation-triangle text-warning me-1"></i>
                Attention : la suppression d'un annotateur est une suppression logique et non physique.
            </small>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: scripts}"></footer>
</body>
</html>
