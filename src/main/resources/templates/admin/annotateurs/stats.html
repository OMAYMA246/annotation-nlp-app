<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Stats Annotateur')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>

<div class="container mt-4" style="max-width:700px">
    <div class="d-flex align-items-center mb-4">
        <a th:href="@{/admin/annotateurs}" class="btn btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i></a>
        <h2 class="fw-bold mb-0">
            <i class="bi bi-bar-chart me-2 text-primary"></i>
            Stats — <span th:text="${annotateur.prenom + ' ' + annotateur.nom}"></span>
        </h2>
    </div>

    <div class="row g-4">
        <div class="col-sm-4">
            <div class="card border-0 shadow-sm text-center p-3">
                <div class="fs-2 fw-bold text-primary" th:text="${stats.totalTaches}">0</div>
                <div class="text-muted small">Tâches assignées</div>
            </div>
        </div>
        <div class="col-sm-4">
            <div class="card border-0 shadow-sm text-center p-3">
                <div class="fs-2 fw-bold text-success" th:text="${stats.tachesTerminees}">0</div>
                <div class="text-muted small">Terminées</div>
            </div>
        </div>
        <div class="col-sm-4">
            <div class="card border-0 shadow-sm text-center p-3">
                <div class="fs-2 fw-bold text-warning" th:text="${stats.tachesRestantes}">0</div>
                <div class="text-muted small">Restantes</div>
            </div>
        </div>

        <div class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <div class="fw-semibold mb-2">Progression globale</div>
                    <div class="progress" style="height:20px">
                        <div class="progress-bar bg-success"
                             th:style="'width:' + ${#numbers.formatDecimal(stats.progression, 0, 0)} + '%'"
                             th:text="${#numbers.formatDecimal(stats.progression, 0, 1)} + '%'"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12" th:if="${!stats.distribution.empty}">
            <div class="card border-0 shadow-sm">
                <div class="card-header fw-semibold">Distribution des classes annotées</div>
                <div class="card-body">
                    <div th:each="entry : ${stats.distribution}" class="mb-3">
                        <div class="d-flex justify-content-between mb-1">
                            <span class="fw-semibold" th:text="${entry.key}"></span>
                            <span th:text="${entry.value}"></span>
                        </div>
                        <div class="progress" style="height:12px">
                            <div class="progress-bar"
                                 th:style="'width:' + ${entry.value * 100 / stats.tachesTerminees} + '%'"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: scripts}"></footer>
</body>
</html>
