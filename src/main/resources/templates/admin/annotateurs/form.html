<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Ajouter Annotateur')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>
<div class="container mt-4" style="max-width:500px">
    <div class="d-flex align-items-center mb-4">
        <a th:href="@{/admin/annotateurs}" class="btn btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i></a>
        <h2 class="fw-bold mb-0">Ajouter un annotateur</h2>
    </div>
    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <div class="alert alert-info py-2 mb-3">
                <i class="bi bi-info-circle me-2"></i>
                Le mot de passe sera gûˋnûˋrûˋ automatiquement et affichûˋ une seule fois aprû´s la crûˋation.
            </div>
            <form th:action="@{/admin/annotateurs/nouveau}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Nom *</label>
                    <input type="text" name="nom" class="form-control" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Prûˋnom *</label>
                    <input type="text" name="prenom" class="form-control" required/>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Login (gÕnÕrÕ automatiquement)</label>
                    <input type="text" id="loginField" name="login" class="form-control bg-light" readonly/>
                    <small class="text-muted">Format : prenom.nom</small>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary px-4">Crûˋer</button>
                    <a th:href="@{/admin/annotateurs}" class="btn btn-outline-secondary">Annuler</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
function genererLogin() {
    const nom = document.querySelector("[name=nom]").value.toLowerCase().replace(/[^a-z0-9]/g, "");
    const prenom = document.querySelector("[name=prenom]").value.toLowerCase().replace(/[^a-z0-9]/g, "");
    if (prenom && nom) document.getElementById("loginField").value = prenom + "." + nom;
}
document.querySelector("[name=nom]").addEventListener("input", genererLogin);
document.querySelector("[name=prenom]").addEventListener("input", genererLogin);
</script>
<footer th:replace="~{fragments/layout :: scripts}"></footer>
</body>
</html>
