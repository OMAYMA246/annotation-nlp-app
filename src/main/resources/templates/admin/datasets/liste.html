<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Liste des Datasets')}"></head>
<body class="bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>

<div class="container-fluid mt-4" style="max-width:1100px">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0">
            <i class="bi bi-database me-2 text-primary"></i>Liste des Datasets
        </h2>
        <a th:href="@{/admin/datasets/nouveau}" class="btn btn-primary">
            <i class="bi bi-plus-circle me-2"></i>Nouveau Dataset
        </a>
    </div>

    <div th:if="${datasets.empty}" class="card border-0 shadow-sm text-center py-5 text-muted">
        <i class="bi bi-database-x" style="font-size:3rem"></i>
        <p class="mt-3 fs-5 mb-2">Aucun dataset créé pour le moment.</p>
        <a th:href="@{/admin/datasets/nouveau}" class="btn btn-primary mt-2">
            <i class="bi bi-plus-circle me-1"></i>Créer le premier dataset
        </a>
    </div>

    <div class="card border-0 shadow-sm" th:if="${!datasets.empty}">
        <div class="card-header fw-semibold bg-white border-bottom">
            <i class="bi bi-table me-2 text-primary"></i>Liste des datasets
            <span class="badge bg-primary ms-2" th:text="${datasets.size()}"></span>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-light">
                        <tr>
                            <th style="width:40px">#</th>
                            <th>Nom</th>
                            <th style="min-width:200px">% Avancement</th>
                            <th>Taille</th>
                            <th>Date limite</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="ds, iter : ${datasets}">
                            <td class="text-muted" th:text="${iter.index + 1}"></td>
                            <td>
                                <div class="fw-semibold" th:text="${ds.nomDataset}"></div>
                                <small class="text-muted" th:if="${ds.description != null}"
                                       th:text="${#strings.abbreviate(ds.description, 60)}"></small>
                            </td>
                            <td>
                                <div class="d-flex align-items-center gap-2"
                                     th:with="pct=${datasetsStats != null and datasetsStats[ds.id] != null ? datasetsStats[ds.id] : 0}">
                                    <div class="progress flex-grow-1" style="height:10px">
                                        <div class="progress-bar bg-success"
                                             th:style="'width:' + ${pct} + '%'"></div>
                                    </div>
                                    <small class="fw-semibold" th:text="${pct} + '%'"></small>
                                </div>
                            </td>
                            <td>
                                <span class="badge bg-secondary"
                                      th:text="${ds.exemples.size()} + ' ex.'"></span>
                            </td>
                            <td>
                                <span th:if="${ds.dateLimite != null}"
                                      th:text="${#temporals.format(ds.dateLimite, 'dd/MM/yyyy')}"
                                      class="text-danger fw-semibold"></span>
                                <span th:if="${ds.dateLimite == null}" class="text-muted">—</span>
                            </td>
                            <td class="text-center">
                                <div class="d-flex gap-2 justify-content-center flex-wrap">
                                    <a th:href="@{/admin/datasets/{id}(id=${ds.id})}"
                                       class="btn btn-sm btn-outline-primary">
                                        <i class="bi bi-eye me-1"></i>Détails
                                    </a>
                                    <a th:href="@{/admin/datasets/{id}/affecter(id=${ds.id})}"
                                       class="btn btn-sm btn-outline-success">
                                        <i class="bi bi-person-plus me-1"></i>Ajouter Annotateurs
                                    </a>
                                    <form th:action="@{/admin/datasets/{id}/supprimer(id=${ds.id})}"
                                          method="post" class="mb-0"
                                          onsubmit="return confirm('Supprimer ce dataset ?')">
                                        <button class="btn btn-sm btn-outline-danger">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: scripts}"></footer>
</body>
</html>
