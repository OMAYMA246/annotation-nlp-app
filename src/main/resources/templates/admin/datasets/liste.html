<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Datasets')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>

<div class="container-fluid mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold"><i class="bi bi-database me-2 text-primary"></i>Datasets</h2>
        <a th:href="@{/admin/datasets/nouveau}" class="btn btn-primary">
            <i class="bi bi-plus-circle me-2"></i>Nouveau Dataset
        </a>
    </div>

    <div class="row g-4" th:if="${!datasets.empty}">
        <div class="col-md-4" th:each="ds : ${datasets}">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-header bg-primary text-white py-3">
                    <h5 class="mb-0 fw-bold" th:text="${ds.nomDataset}"></h5>
                </div>
                <div class="card-body">
                    <p class="text-muted small" th:text="${ds.description ?: 'Pas de description'}"></p>
                    <div class="d-flex gap-2 flex-wrap mb-3">
                        <span class="badge bg-info">
                            <i class="bi bi-file-text me-1"></i>
                            <span th:text="${ds.exemples.size()}"></span> exemples
                        </span>
                        <span class="badge bg-secondary">
                            <i class="bi bi-people me-1"></i>
                            <span th:text="${ds.annotateurs.size()}"></span> annotateurs
                        </span>
                        <span class="badge"
                              th:classappend="${ds.nombreTextesParExemple > 1} ? 'bg-warning text-dark' : 'bg-success'"
                              th:text="${ds.nombreTextesParExemple == 1} ? 'Mono-texte' : ds.nombreTextesParExemple + ' textes'">
                        </span>
                    </div>
                    <div class="d-flex gap-2 flex-wrap mb-2">
                        <span class="badge bg-light text-dark border"
                              th:each="cp : ${ds.classesPossibles}"
                              th:text="${cp.libelleClasse}"></span>
                    </div>
                </div>
                <div class="card-footer bg-transparent d-flex gap-2">
                    <a th:href="@{/admin/datasets/{id}(id=${ds.id})}" class="btn btn-sm btn-outline-primary">
                        <i class="bi bi-eye me-1"></i>Détails
                    </a>
                    <a th:href="@{/admin/datasets/{id}/affecter(id=${ds.id})}" class="btn btn-sm btn-outline-success">
                        <i class="bi bi-person-plus me-1"></i>Affecter
                    </a>
                    <form th:action="@{/admin/datasets/{id}/supprimer(id=${ds.id})}" method="post" class="ms-auto"
                          onsubmit="return confirm('Supprimer ce dataset ?')">
                        <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${datasets.empty}" class="text-center py-5 text-muted">
        <i class="bi bi-database-x" style="font-size:4rem"></i>
        <p class="mt-3 fs-5">Aucun dataset. Créez-en un pour commencer !</p>
    </div>
</div>
<footer th:replace="~{fragments/layout :: scripts}"></footer>
</body>
</html>
