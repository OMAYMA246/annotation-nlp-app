<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Affecter Annotateurs')}"></head>
<body class="bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>

<div class="container mt-4" style="max-width:700px">
    <div class="d-flex align-items-center mb-4">
        <a th:href="@{/admin/datasets/{id}(id=${dataset.id})}" class="btn btn-outline-secondary me-3">
            <i class="bi bi-arrow-left"></i>
        </a>
        <div>
            <h2 class="fw-bold mb-0">
                <i class="bi bi-person-plus me-2 text-primary"></i>Affecter les Annotateurs
            </h2>
            <small class="text-muted">Dataset : <strong th:text="${dataset.nomDataset}"></strong></small>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-header fw-semibold bg-white border-bottom">
            <i class="bi bi-people me-2 text-primary"></i>Liste des Annotateurs
        </div>
        <div class="card-body p-0">
            <form th:action="@{/admin/datasets/{id}/affecter(id=${dataset.id})}" method="post">

                <div th:if="${tousAnnotateurs.empty}" class="text-center text-muted py-5">
                    <i class="bi bi-people" style="font-size:2.5rem"></i>
                    <p class="mt-3">Aucun annotateur disponible.</p>
                    <a th:href="@{/admin/annotateurs/nouveau}" class="btn btn-primary btn-sm">
                        Ajouter un annotateur
                    </a>
                </div>

                <div th:if="${!tousAnnotateurs.empty}">
                    <table class="table table-hover mb-0 align-middle">
                        <thead class="table-light">
                            <tr>
                                <th style="width:60px" class="text-center">Sélection</th>
                                <th>Nom</th>
                                <th>Prénom</th>
                                <th>Login</th>
                                <th class="text-center">Statut</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="annot : ${tousAnnotateurs}"
                                th:classappend="${dataset.annotateurs.contains(annot)} ? 'table-success' : ''">
                                <td class="text-center">
                                    <input type="checkbox"
                                           name="annotateurIds"
                                           th:value="${annot.id}"
                                           class="form-check-input"
                                           style="width:20px;height:20px;cursor:pointer"
                                           th:checked="${dataset.annotateurs.contains(annot)}"/>
                                </td>
                                <td class="fw-semibold" th:text="${annot.nom}"></td>
                                <td th:text="${annot.prenom}"></td>
                                <td><code th:text="${annot.login}"></code></td>
                                <td class="text-center">
                                    <span th:if="${annot.active}" class="badge bg-success">Actif</span>
                                    <span th:if="${!annot.active}" class="badge bg-secondary">Inactif</span>
                                    <span th:if="${dataset.annotateurs.contains(annot)}"
                                          class="badge bg-primary ms-1">Affecté</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    <div class="card-footer bg-white border-top d-flex gap-2 justify-content-end p-3">
                        <a th:href="@{/admin/datasets/{id}(id=${dataset.id})}"
                           class="btn btn-outline-secondary">Annuler</a>
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="bi bi-check-circle me-2"></i>Valider
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="alert alert-info mt-3 py-2">
        <i class="bi bi-info-circle me-2"></i>
        L'affectation distribuera automatiquement les exemples entre les annotateurs sélectionnés.
    </div>
</div>
<footer th:replace="~{fragments/layout :: scripts}"></footer>
</body>
</html>
