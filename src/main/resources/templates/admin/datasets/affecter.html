<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Affecter Annotateurs')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>

<div class="container mt-4" style="max-width:700px">
    <div class="d-flex align-items-center mb-4">
        <a th:href="@{/admin/datasets/{id}(id=${dataset.id})}" class="btn btn-outline-secondary me-3">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h2 class="fw-bold mb-0">Affecter des annotateurs</h2>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-header bg-success text-white">
            <i class="bi bi-person-check me-2"></i>
            Dataset : <strong th:text="${dataset.nomDataset}"></strong>
        </div>
        <div class="card-body">
            <div class="alert alert-info">
                <i class="bi bi-info-circle me-2"></i>
                Chaque exemple sera assigné à <strong>3 annotateurs minimum</strong> (ou tous si moins de 3).
                La distribution est automatique et aléatoire.
            </div>

            <form th:action="@{/admin/datasets/{id}/affecter(id=${dataset.id})}" method="post">
                <label class="form-label fw-semibold">Sélectionner les annotateurs</label>

                <div th:if="${tousAnnotateurs.empty}" class="text-muted mb-3">
                    Aucun annotateur disponible. <a th:href="@{/admin/annotateurs/nouveau}">En créer un</a>.
                </div>

                <div class="list-group mb-4" th:if="${!tousAnnotateurs.empty}">
                    <label class="list-group-item list-group-item-action"
                           th:each="annot : ${tousAnnotateurs}">
                        <div class="d-flex align-items-center gap-3">
                            <input type="checkbox" name="annotateurIds"
                                   th:value="${annot.id}"
                                   th:checked="${dataset.annotateurs.contains(annot)}"
                                   class="form-check-input fs-5"/>
                            <div>
                                <div class="fw-semibold" th:text="${annot.prenom + ' ' + annot.nom}"></div>
                                <small class="text-muted" th:text="${annot.login}"></small>
                            </div>
                            <span class="ms-auto badge"
                                  th:classappend="${annot.active} ? 'bg-success' : 'bg-danger'"
                                  th:text="${annot.active} ? 'Actif' : 'Inactif'"></span>
                        </div>
                    </label>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success px-4">
                        <i class="bi bi-check-circle me-2"></i>Valider et distribuer
                    </button>
                    <a th:href="@{/admin/datasets/{id}(id=${dataset.id})}" class="btn btn-outline-secondary">Annuler</a>
                </div>
            </form>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: scripts}"></footer>
</body>
</html>
