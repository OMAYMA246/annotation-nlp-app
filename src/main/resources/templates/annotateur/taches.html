<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Mes Tâches')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>

<div class="page-wrapper">
    <h2 class="fw-bold mb-4" style="font-size:1.4rem">
        <i class="bi bi-list-task me-2" style="color:#3b82f6"></i>Mes Tâches
    </h2>

    <!-- Stats -->
    <div class="row g-3 mb-4">
        <div class="col-sm-3">
            <div class="stat-card">
                <div class="stat-value" style="color:#3b82f6" th:text="${stats.totalTaches}">0</div>
                <div class="stat-label">Total</div>
            </div>
        </div>
        <div class="col-sm-3">
            <div class="stat-card">
                <div class="stat-value" style="color:#22c55e" th:text="${stats.tachesTerminees}">0</div>
                <div class="stat-label">Terminées</div>
            </div>
        </div>
        <div class="col-sm-3">
            <div class="stat-card">
                <div class="stat-value" style="color:#f59e0b" th:text="${stats.tachesRestantes}">0</div>
                <div class="stat-label">Restantes</div>
            </div>
        </div>
        <div class="col-sm-3">
            <div class="stat-card">
                <div class="stat-label mb-2">Progression globale</div>
                <div class="ap-progress mb-1">
                    <div class="ap-progress-bar" style="background:#3b82f6"
                         th:style="'width:' + ${#numbers.formatDecimal(stats.progression, 0, 0)} + '%;background:#3b82f6'"></div>
                </div>
                <div style="font-size:.9rem;font-weight:600"
                     th:text="${#numbers.formatDecimal(stats.progression, 0, 1)} + '%'"></div>
            </div>
        </div>
    </div>

    <!-- Vide -->
    <div th:if="${tachesParDataset.empty}" class="ap-card text-center py-5">
        <i class="bi bi-inbox" style="font-size:3rem;color:#cbd5e1"></i>
        <p class="fw-semibold mt-3 mb-0">Aucune tâche assignée pour le moment.</p>
    </div>

    <!-- Table -->
    <div class="ap-card" th:if="${!tachesParDataset.empty}">
        <div class="ap-card-header">
            <span><i class="bi bi-grid me-2" style="color:#3b82f6"></i>Tâches par dataset</span>
        </div>
        <div class="table-responsive">
            <table class="ap-table">
                <thead>
                    <tr>
                        <th>Dataset</th>
                        <th>Date limite</th>
                        <th style="min-width:180px">Avancement</th>
                        <th>Taille</th>
                        <th class="text-end">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="resume : ${tachesParDataset}">
                        <td>
                            <span class="fw-semibold" th:text="${resume.dataset.nomDataset}"></span>
                        </td>
                        <td>
                            <span th:if="${resume.dataset.dateLimite != null}"
                                  class="ap-badge ap-badge-red"
                                  th:text="${#temporals.format(resume.dataset.dateLimite, 'dd/MM/yyyy')}"></span>
                            <span th:if="${resume.dataset.dateLimite == null}" class="text-muted">—</span>
                        </td>
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <div class="ap-progress flex-grow-1">
                                    <div class="ap-progress-bar" style="background:#3b82f6"
                                         th:style="'width:' + ${#numbers.formatDecimal(resume.progression, 0, 0)} + '%;background:#3b82f6'"></div>
                                </div>
                                <small class="fw-semibold"
                                       th:text="${#numbers.formatDecimal(resume.progression, 0, 0)} + '%'"></small>
                            </div>
                        </td>
                        <td class="text-muted" th:text="${resume.totalTaches}"></td>
                        <td class="text-end">
                            <a th:if="${resume.premierExempleNonTermineId != null}"
                               th:href="@{/annotateur/annoter/{id}(id=${resume.premierExempleNonTermineId})}"
                               class="ap-btn ap-btn-primary ap-btn-sm">
                                Travailler<i class="bi bi-chevron-right"></i>
                            </a>
                            <span th:if="${resume.premierExempleNonTermineId == null}"
                                  class="ap-badge ap-badge-green">
                                <i class="bi bi-check-circle"></i>Terminé
                            </span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: scripts}"></footer>
</body>
</html>
